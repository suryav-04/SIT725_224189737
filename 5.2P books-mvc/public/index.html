<!DOCTYPE html>
<html>
<head>
  <title>Books Catalog</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f5f5f5;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
    }

    .book {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .author {
      font-size: 16px;
      color: gray;
    }

    .summary {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>Books List</h1>

  <div id="books"></div>

  <script>
    fetch("/api/books")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("books");

        data.forEach(book => {
          const div = document.createElement("div");
          div.className = "book";

          div.innerHTML = `
            <div class="title">${book.title}</div>
            <div class="author">by ${book.author}</div>
            <div class="summary">${book.summary}</div>
          `;

          container.appendChild(div);
        });
      });
  </script>

</body>
</html>
